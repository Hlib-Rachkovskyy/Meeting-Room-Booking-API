openapi: 3.1.0
info:
  title: Meeting Room Booking API
  version: v1
  description: RESTful API for managing meeting rooms and time-slot bookings. Built with ASP.NET Core 8 using Clean Architecture.

servers:
  - url: https://localhost:5001
    description: Local development (HTTPS)
  - url: http://localhost:5000
    description: Local development (HTTP)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Short-lived access token (15 minutes). Obtain via /api/auth/login or /api/auth/register."

  schemas:
    RegisterRequest:
      type: object
      required: [fullName, email, password]
      properties:
        fullName: { type: string, example: "Jane Smith" }
        email: { type: string, format: email, example: "jane@example.com" }
        password: { type: string, format: password, example: "S3cur3P@ss!" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: "jane@example.com" }
        password: { type: string, format: password, example: "S3cur3P@ss!" }

    AuthResponse:
      type: object
      properties:
        accessToken: { type: string, description: "JWT access token valid for 15 minutes." }
        email: { type: string, format: email }
        fullName: { type: string }
        expiresAt: { type: string, format: date-time }

    RefreshResponse:
      type: object
      properties:
        accessToken: { type: string, description: "New JWT access token valid for 15 minutes." }
        expiresAt: { type: string, format: date-time }

    Room:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: "Conference Room A" }
        location: { type: string, example: "Floor 2 - East Wing" }
        capacity: { type: integer, example: 12 }
        bookings:
          type: array
          items: { $ref: '#/components/schemas/Booking' }

    Booking:
      type: object
      properties:
        id: { type: string, format: uuid }
        roomId: { type: string, format: uuid }
        bookedBy: { type: string, example: "John Doe" }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }

    CreateRoomRequest:
      type: object
      required: [name, location, capacity]
      properties:
        name: { type: string, example: "Conference Room A" }
        location: { type: string, example: "Floor 2 - East Wing" }
        capacity: { type: integer, minimum: 1, example: 12 }

    CreateBookingRequest:
      type: object
      required: [bookedBy, startTime, endTime]
      properties:
        bookedBy: { type: string, example: "John Doe" }
        startTime: { type: string, format: date-time, example: "2026-04-10T10:00:00Z" }
        endTime: { type: string, format: date-time, example: "2026-04-10T11:30:00Z" }

    ProblemDetails:
      type: object
      properties:
        status: { type: integer }
        title: { type: string }
        detail: { type: string }
        type: { type: string }

security:
  - BearerAuth: []

paths:
  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: Registration successful. Refresh token set as HttpOnly cookie.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
          headers:
            Set-Cookie:
              description: "refreshToken=<jwt>; HttpOnly; Secure; SameSite=Strict; Expires=+7days"
              schema: { type: string }
        '409':
          description: Email already registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate and receive tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful. Refresh token set as HttpOnly cookie.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
          headers:
            Set-Cookie:
              description: "refreshToken=<jwt>; HttpOnly; Secure; SameSite=Strict; Expires=+7days"
              schema: { type: string }
        '401':
          description: Invalid email or password.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /api/auth/refresh:
    post:
      tags: [Authentication]
      summary: Rotate refresh token and issue new access token
      description: |
        Reads the `refreshToken` HttpOnly cookie automatically. No request body required.
        **Cannot be tested from Swagger UI** — use Postman with cookies enabled.
      security: []
      parameters:
        - in: cookie
          name: refreshToken
          required: true
          schema: { type: string }
          description: Long-lived refresh token JWT (7 days).
      responses:
        '200':
          description: New access token issued. New refresh token cookie set (rotation).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RefreshResponse' }
          headers:
            Set-Cookie:
              description: "New rotated refreshToken cookie"
              schema: { type: string }
        '401':
          description: Refresh token missing, invalid, or expired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /api/auth/logout:
    post:
      tags: [Authentication]
      summary: Log out and clear refresh token cookie
      responses:
        '204':
          description: Logged out. Refresh token cookie cleared.
        '401':
          description: Not authenticated.

  /api/rooms:
    get:
      tags: [Rooms]
      summary: Get all meeting rooms
      responses:
        '200':
          description: List of all rooms.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Room' }
    post:
      tags: [Rooms]
      summary: Create a new meeting room
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRoomRequest' }
      responses:
        '201':
          description: Room created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Room' }
        '400':
          description: Validation error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }

  /api/rooms/{id}:
    get:
      tags: [Rooms]
      summary: Get a room by ID (includes bookings)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Room found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Room' }
        '404':
          description: Room not found.
    delete:
      tags: [Rooms]
      summary: Delete a room
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Room deleted.
        '404':
          description: Room not found.

  /api/rooms/{roomId}/bookings:
    get:
      tags: [Bookings]
      summary: Get all bookings for a room
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: List of bookings.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Booking' }
    post:
      tags: [Bookings]
      summary: Create a booking (rejects overlapping slots)
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBookingRequest' }
      responses:
        '201':
          description: Booking created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Booking' }
        '400':
          description: Time slot conflict or invalid input.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '404':
          description: Room not found.

  /api/rooms/{roomId}/bookings/{bookingId}:
    delete:
      tags: [Bookings]
      summary: Cancel a booking
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: bookingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Booking cancelled.
        '404':
          description: Booking not found.
